<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Studio Terminal</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080d13;
      --panel: #0b1118;
      --line: #263241;
      --text: #d7f7e8;
      --muted: #85a195;
      --accent: #8ff2bf;
      --danger: #ffad95;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Cascadia Mono", Consolas, ui-monospace, monospace;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: #0f1721;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    h1 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .glyph {
      width: 36px;
      height: 30px;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #111d29;
      color: var(--accent);
      font: 800 14px/1 "Cascadia Mono", Consolas, ui-monospace, monospace;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input, button {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0b1118;
      color: var(--text);
      font: 13px/1 "Cascadia Mono", Consolas, ui-monospace, monospace;
    }

    input { padding: 0 10px; width: 150px; }
    button {
      padding: 0 10px;
      cursor: pointer;
      font-weight: 800;
    }

    button:hover { border-color: var(--accent); }

    main {
      min-height: 0;
      display: grid;
      grid-template-rows: 1fr;
    }

    .terminal {
      overflow: auto;
      padding: 14px;
      background: var(--panel);
      font: 14px/1.55 "Cascadia Mono", Consolas, ui-monospace, monospace;
    }

    .line {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .cmd { color: #effff6; font-weight: 800; }
    .muted { color: var(--muted); }
    .err { color: var(--danger); }

    .input-row {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px;
      align-items: center;
    }

    .prompt {
      color: var(--accent);
      font-weight: 900;
      white-space: nowrap;
    }

    #command {
      width: 100%;
      height: 26px;
      border: 0;
      border-radius: 0;
      outline: 0;
      background: transparent;
      color: #effff6;
      padding: 0;
      font: inherit;
    }

    @media (max-width: 720px) {
      header { align-items: flex-start; flex-direction: column; }
      .toolbar { width: 100%; flex-wrap: wrap; }
      input { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <h1 id="terminalTitle"><span class="glyph">&gt;_</span>Project Studio Terminal · Codex linked</h1>
    <div class="toolbar">
      <input id="cwd" placeholder="/home/ubuntu" title="Working directory" />
      <input id="timeout" type="number" min="1" max="120" value="45" title="Timeout seconds" />
      <button id="clear">clear</button>
      <button id="closeWindow">close</button>
    </div>
  </header>
  <main>
    <section id="terminal" class="terminal" tabindex="0">
      <div id="history">
        <div id="terminalHint" class="line muted">Connected to Project Studio command runner. Type a command and press Enter.</div>
      </div>
      <div class="input-row">
        <span class="prompt">ubuntu@haproxy01:~$</span>
        <input id="command" autocomplete="off" spellcheck="false" autofocus />
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const state = { commands: [], index: -1 };
    const params = new URLSearchParams(window.location.search);
    const isK8sMode = params.get("mode") === "k8s";

    if (isK8sMode) {
      document.title = "Kubernetes Terminal";
      $("terminalTitle").innerHTML = '<span class="glyph">&gt;_</span>Kubernetes Terminal';
      $("terminalHint").textContent = "Connected to Kubernetes command runner. Try: kubectl get nodes";
      $("cwd").placeholder = "/home/ubuntu";
    }

    function scrollBottom() {
      $("terminal").scrollTop = $("terminal").scrollHeight;
    }

    function append(text, className = "") {
      const line = document.createElement("div");
      line.className = `line ${className}`;
      line.textContent = text;
      $("history").appendChild(line);
      scrollBottom();
    }

    async function runCommand() {
      const command = $("command").value.trim();
      if (!command) return;
      if (command === "clear") {
        $("history").innerHTML = "";
        $("command").value = "";
        return;
      }

      $("command").value = "";
      state.commands.push(command);
      state.index = state.commands.length;
      append(`$ ${command}`, "cmd");
      append("running...", "muted");

      try {
        const res = await fetch("/api/terminal/run", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            command,
            cwd: $("cwd").value.trim() || null,
            timeout: Number($("timeout").value || 45)
          })
        });
        const data = await res.json();
        $("history").lastElementChild?.remove();
        if (!res.ok) throw new Error(data.detail || res.statusText);
        if (data.stdout) append(data.stdout);
        if (data.stderr) append(`[stderr]\n${data.stderr}`, "err");
        append(`[exit ${data.exitCode}] audit ${data.auditId}`, "muted");
      } catch (error) {
        $("history").lastElementChild?.remove();
        append(String(error.message || error), "err");
      }
    }

    $("terminal").addEventListener("click", () => $("command").focus());
    $("clear").addEventListener("click", () => { $("history").innerHTML = ""; $("command").focus(); });
    $("closeWindow").addEventListener("click", () => window.close());
    $("command").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        runCommand();
      }
      if (event.key === "ArrowUp") {
        event.preventDefault();
        state.index = Math.max(0, state.index - 1);
        $("command").value = state.commands[state.index] || "";
      }
      if (event.key === "ArrowDown") {
        event.preventDefault();
        state.index = Math.min(state.commands.length, state.index + 1);
        $("command").value = state.commands[state.index] || "";
      }
    });
    $("command").focus();
  </script>
</body>
</html>
